spring.application.name=delivery-backend
#active profile local
spring.profiles.active=local

server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_app_v1
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# MinIO Configuration
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=product-images
minio.banner-bucket-name=banner-images


# Keycloak (admin-only resource server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/delivery-admin

# ---------------------------------------------------------------------------
# Customer JWT (Spring-issued, separate from Keycloak; used by /app/consumer/**)
# ---------------------------------------------------------------------------
# Override in application-local.properties / env. Must be at least 32 chars (256 bits) for HS256.
app.jwt.secret=${EREZER_JWT_SECRET:change-me-in-production-please-32chars-min}
app.jwt.access-token-ttl-minutes=60
app.jwt.refresh-token-ttl-days=14
app.jwt.issuer=erezer-store

# ---------------------------------------------------------------------------
# Frontend URLs (used inside email templates for verify/reset links)
# ---------------------------------------------------------------------------
app.frontend.store-url=${EREZER_STORE_URL:http://localhost:4200}
app.frontend.admin-url=${EREZER_ADMIN_URL:http://localhost:4300}

# ---------------------------------------------------------------------------
# Mail (SMTP). Defaults target Mailtrap-style sandbox; override in -local.
# ---------------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM:no-reply@erezer.com}
app.mail.from-name=${MAIL_FROM_NAME:Erezer}

# ---------------------------------------------------------------------------
# Redis (sessions, cache, rate limiting)
# ---------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# ---------------------------------------------------------------------------
# Rate limiting (Redis-backed sliding-counter)
# ---------------------------------------------------------------------------
app.rate-limit.auth.requests-per-minute=10
app.rate-limit.auth.window-seconds=60

# ---------------------------------------------------------------------------
# Order cancellation policy (Phase 4)
# ---------------------------------------------------------------------------
# Customers may self-cancel an order until either the status leaves the
# cancellable set OR this many minutes have elapsed since creation —
# whichever is sooner. Admin-side cancellation is always allowed.
app.orders.cancellation-window-minutes=60

# ---------------------------------------------------------------------------
# Returns / RMA (Phase 5)
# ---------------------------------------------------------------------------
# Customers may request a return within this many days of delivery. The
# window is enforced server-side against orders.delivered_at.
app.returns.window-days=14
# MinIO bucket for return-evidence photos (uploaded via FileStorageService).
app.returns.bucket=return-photos

# ---------------------------------------------------------------------------
# Abandoned cart (Phase 8)
# ---------------------------------------------------------------------------
# Customers receive at most one reminder per cart state — `last_emailed_at`
# on the cart row gates re-sends. Cron default: 09:00 server time daily.
app.cart.abandon.idle-hours=24
app.cart.abandon.cron=0 0 9 * * *

# ---------------------------------------------------------------------------
# Phase 7 — Sentry. Leave dsn blank in dev; set SENTRY_DSN in prod env.
# Auto-instrument is on; sampling rates are conservative to control quota.
# ---------------------------------------------------------------------------
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENV:${spring.profiles.active:default}}
sentry.release=${SENTRY_RELEASE:${spring.application.name}@dev}
sentry.send-default-pii=false
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.exception-resolver-order=-2147483647
# Server name shown in Sentry; helps when multiple instances run.
sentry.server-name=${HOSTNAME:erezer-backend}

# ---------------------------------------------------------------------------
# bKash gateway (Phase 4) — sandbox-stub by default. Switch
# app.bkash.mode=REST and fill credentials when connecting the real sandbox.
# ---------------------------------------------------------------------------
app.bkash.mode=STUB
app.bkash.base-url=${BKASH_BASE_URL:https://tokenized.sandbox.bka.sh/v1.2.0-beta}
app.bkash.app-key=${BKASH_APP_KEY:}
app.bkash.app-secret=${BKASH_APP_SECRET:}
app.bkash.username=${BKASH_USERNAME:}
app.bkash.password=${BKASH_PASSWORD:}
app.bkash.callback-url=${BKASH_CALLBACK_URL:http://localhost:8080/api/payments/bkash/callback}

# ---------------------------------------------------------------------------
# Thymeleaf (template caching off in dev; turn on in prod profile)
# ---------------------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# ---------------------------------------------------------------------------
# Flyway (introduced in Phase 3)
# ---------------------------------------------------------------------------
# Existing dev DBs were built by Hibernate ddl-auto=update through Phase 2.
# baseline-on-migrate=true tells Flyway to mark a non-empty DB as already on
# baseline-version, then apply only later migrations. V1 is a marker only;
# V2 onwards is the real schema delta.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Phase 2 marker (Hibernate-managed up to this point)
spring.flyway.locations=classpath:db/migration

# Transitional: Hibernate ddl-auto=update remains so existing dev DBs aren't
# broken, but from Phase 3 forward every intentional schema change is
# expressed as a Flyway migration. Switch to `validate` once a real V1
# baseline has been generated from the live schema.
spring.jpa.hibernate.ddl-auto=update
