<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${subject}">Erezer</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f4;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f4;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e7e5e4;">
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid #e7e5e4;background:#0c0a09;color:#fafaf9;">
              <div style="font-size:22px;font-weight:700;letter-spacing:0.08em;">EREZER</div>
              <div style="font-size:12px;color:#a8a29e;margin-top:2px;">Clothing for the everyday</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <div th:replace="${bodyFragment}">Body goes here.</div>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #e7e5e4;background:#fafaf9;color:#78716c;font-size:12px;">
              You're receiving this because of activity on your Erezer account.<br>
              &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Erezer. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
