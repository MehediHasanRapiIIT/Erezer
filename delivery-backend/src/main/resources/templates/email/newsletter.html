<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background:#f5f5f4;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f4;padding:32px 0;">
  <tr><td align="center">
    <table width="640" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:12px;border:1px solid #e7e5e4;overflow:hidden;">
      <tr><td style="padding:24px 32px;background:#0c0a09;color:#fafaf9;">
        <div style="font-size:22px;font-weight:700;letter-spacing:0.08em;">EREZER</div>
        <div style="font-size:12px;color:#a8a29e;margin-top:2px;">Clothing for the everyday</div>
      </td></tr>
      <tr><td style="padding:32px;line-height:1.6;">
        <!-- Admin-authored HTML. Trusted source (admin panel) so we render verbatim. -->
        <div th:utext="${bodyHtml}">Campaign content goes here.</div>
      </td></tr>
      <tr><td style="padding:20px 32px;border-top:1px solid #e7e5e4;background:#fafaf9;color:#78716c;font-size:12px;line-height:1.6;">
        You're receiving this because you subscribed to Erezer updates with
        <span th:text="${recipientEmail}">you@example.com</span>.<br>
        <a th:href="${unsubscribeUrl}" style="color:#78716c;text-decoration:underline;">Unsubscribe</a>
        &middot;
        &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Erezer
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
