<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background:#f5f5f4;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f4;padding:32px 0;">
  <tr><td align="center">
    <table width="560" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:12px;border:1px solid #e7e5e4;">
      <tr><td style="padding:24px 32px;background:#0c0a09;color:#fafaf9;">
        <div style="font-size:22px;font-weight:700;letter-spacing:0.08em;">EREZER</div>
      </td></tr>
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 16px;font-size:22px;">Verify your email</h1>
        <p style="margin:0 0 16px;line-height:1.6;">
          Hi <span th:text="${firstName}">there</span>, please confirm this email address so we can secure your Erezer account.
        </p>
        <p style="margin:24px 0;">
          <a th:href="${verifyUrl}" style="display:inline-block;background:#0c0a09;color:#fafaf9;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;">Verify email</a>
        </p>
        <p style="margin:0 0 8px;color:#78716c;font-size:13px;">Or copy this link:</p>
        <p style="margin:0 0 16px;color:#44403c;font-size:13px;word-break:break-all;" th:text="${verifyUrl}">https://...</p>
        <p style="margin:24px 0 0;color:#78716c;font-size:13px;">
          This link expires in <span th:text="${expiresInHours}">24</span> hours. If you didn't sign up, you can safely ignore this email.
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
