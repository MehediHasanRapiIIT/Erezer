<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background:#f5f5f4;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f5f4;padding:32px 0;">
  <tr><td align="center">
    <table width="520" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:12px;border:1px solid #e7e5e4;">
      <tr><td style="padding:24px 32px;background:#0c0a09;color:#fafaf9;">
        <div style="font-size:22px;font-weight:700;letter-spacing:0.08em;">EREZER</div>
      </td></tr>
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 8px;font-size:20px;">Your invoice is ready</h1>
        <p style="margin:0 0 16px;color:#44403c;line-height:1.6;">
          Hi <strong th:text="${customerName}">there</strong>, thanks for your order.
          Your invoice <strong th:text="${invoiceNumber}">INV-0000</strong> is attached as a PDF.
        </p>
        <div style="background:#fafaf9;border:1px solid #e7e5e4;border-radius:8px;padding:16px 20px;margin:0 0 20px;">
          <div style="color:#78716c;font-size:12px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Total</div>
          <div style="font-size:20px;font-weight:600;" th:text="${total}">Tk 0.00</div>
        </div>
        <p style="margin:0;color:#78716c;font-size:13px;line-height:1.6;">
          Questions about this invoice? Just reply to this email.
        </p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
